<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>Series Library</title>
  <link rel="stylesheet" href="series_library.css">
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <h1>Series Library</h1>
      </div>
      <div class="stats">
        <div class="stat"><strong id="totalCount">0</strong><span>series</span></div>
        <div class="stat"><strong id="yearCount">0</strong><span>years</span></div>
      </div>
      <details class="filter-panel" id="filterPanel" open>
        <summary class="filter-summary">
          <span>Filters and years</span>
          <span id="filterPanelState">Open</span>
        </summary>
        <div class="filter-panel-body">
          <div class="category-filter" id="categoryFilter" aria-label="Category filter">
            <button type="button" class="category-trigger" id="categoryTrigger" aria-expanded="false" aria-haspopup="true" aria-controls="categoryMenu">All categories</button>
            <div class="category-menu" id="categoryMenu">
              <label class="category-option all"><input type="checkbox" id="categoryAll" checked> Select all</label>
              <label class="category-option"><input type="checkbox" class="category-choice" value="Sci-Fi" checked> Sci-Fi</label>
              <label class="category-option"><input type="checkbox" class="category-choice" value="Fantasy" checked> Fantasy</label>
              <label class="category-option"><input type="checkbox" class="category-choice" value="Adventure" checked> Adventure</label>
              <label class="category-option"><input type="checkbox" class="category-choice" value="Action" checked> Action</label>
              <label class="category-option"><input type="checkbox" class="category-choice" value="Animation" checked> Animation</label>
            </div>
          </div>
          <div class="category-filter" id="trendFilter" aria-label="Trend filter">
            <button type="button" class="category-trigger" id="trendTrigger" aria-expanded="false" aria-haspopup="true" aria-controls="trendMenu">All trends</button>
            <div class="category-menu" id="trendMenu">
              <label class="category-option all"><input type="checkbox" id="trendAll" checked> Select all</label>
              <label class="category-option"><input type="checkbox" class="trend-choice" value="up" checked> Trend Up</label>
              <label class="category-option"><input type="checkbox" class="trend-choice" value="down" checked> Trend Down</label>
              <label class="category-option"><input type="checkbox" class="trend-choice" value="disaster" checked> Disaster</label>
            </div>
          </div>
          <div class="score-filter" aria-label="IMDb score range">
            <div class="score-field">
              <label for="minScore">Min score</label>
              <input id="minScore" type="number" min="1" max="10" step="0.1" inputmode="decimal" placeholder="1.0">
            </div>
            <div class="score-field">
              <label for="maxScore">Max score</label>
              <input id="maxScore" type="number" min="1" max="10" step="0.1" inputmode="decimal" placeholder="10.0">
            </div>
          </div>
          <div class="filter-status" id="filterStatus" aria-live="polite">No filters active</div>
          <button type="button" class="reset-filters" id="resetFilters" disabled>Reset filters</button>
          <div class="year-picker">
            <label for="yearSelect">Jump to year</label>
            <div class="select-shell">
              <select id="yearSelect"></select>
            </div>
          </div>
          <div class="nav-label">Browse by decade</div>
          <nav class="year-nav" id="yearNav" aria-label="Jump to year"></nav>
        </div>
      </details>
    </aside>
    <main class="content">
      <div class="toolbar">
        <input class="search" id="search" type="search" placeholder="Search titles..." aria-label="Search titles">
        <div class="toolbar-actions">
          <div class="meta-line" id="metaLine" aria-live="polite"></div>
        </div>
      </div>
      <div class="empty" id="empty" role="status">
        <strong id="emptyTitle">No matching series</strong>
        <span id="emptyMessage">Try widening the current filters.</span>
        <button type="button" class="empty-reset" id="emptyReset">Reset filters</button>
      </div>
      <div id="catalog"></div>
    </main>
  </div>
  <div class="series-detail-backdrop" id="seriesDetailModal" hidden>
    <section class="series-detail-modal" role="dialog" aria-modal="true" aria-labelledby="seriesDetailTitle">
      <div class="series-detail-body" id="seriesDetailBody"></div>
    </section>
  </div>
  <script type="module" src="series_library.js"></script>
</body>
</html>
